services:
  web:
    env_file:
      - .env.production
    restart: unless-stopped
    build: .
    container_name: andersen
    environment:
      FLASK_ENV: production
      SECRET_KEY: jtyjxdnjncdkm
      DATABASE_URL: postgresql://postgres:deno0707@172.17.0.1:5432/andersen
      # Required when users access the app over plain HTTP (e.g. http://IP:5002).
      # Set to true only behind HTTPS (see APP_BASE_URL=https://...).
      SESSION_COOKIE_SECURE: "false"
      APP_BASE_URL: https://hrms.nexusafrica.co.ke
      SALARY_BASIS: annual
      SESSION_LIFETIME_HOURS: "2"
      EMPLOYEE_UPLOADS_ROOT: /employeeuploads
    ports:
      - "5002:5002"
    volumes:
      - ../employeeuploads:/employeeuploads
    # Optional: mount app/static to provide logo.jpg without rebuilding
    #   - ./app/static:/app/app/static:ro
