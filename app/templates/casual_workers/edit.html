{% extends "layouts/base.html" %}
{% block title %}Edit Casual Worker{% endblock %}
{% block content %}
<h1 class="h4 mb-3">Edit Casual Worker</h1>
<form method="post" class="card card-body">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="row g-3">
        <div class="col-md-3">
            <label class="form-label">Worker Number</label>
            <input type="text" name="worker_number" class="form-control" maxlength="30" value="{{ worker.worker_number or '' }}">
        </div>
        <div class="col-md-3">
            <label class="form-label">First Name</label>
            <input type="text" name="first_name" class="form-control" required value="{{ worker.first_name }}">
        </div>
        <div class="col-md-3">
            <label class="form-label">Last Name</label>
            <input type="text" name="last_name" class="form-control" required value="{{ worker.last_name }}">
        </div>
        <div class="col-md-3">
            <label class="form-label">Branch</label>
            <select name="branch_id" class="form-select" required>
                {% for b in branches %}
                <option value="{{ b.id }}" {{ 'selected' if b.id == worker.branch_id else '' }}>{{ b.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ worker.phone or '' }}">
        </div>
        <div class="col-md-3">
            <label class="form-label">National ID</label>
            <input type="text" name="national_id" class="form-control" value="{{ worker.national_id or '' }}">
        </div>
        <div class="col-md-2">
            <label class="form-label">Rate (KES)</label>
            <input type="number" step="0.01" min="0" name="daily_rate" class="form-control" value="{{ worker.daily_rate }}">
        </div>
        <div class="col-md-2">
            <label class="form-label">Rate Unit</label>
            <select name="rate_unit" class="form-select">
                <option value="hourly" {{ 'selected' if worker.rate_unit == 'hourly' else '' }}>Hourly</option>
                <option value="daily" {{ 'selected' if worker.rate_unit in (None, 'daily') else '' }}>Daily</option>
                <option value="weekly" {{ 'selected' if worker.rate_unit == 'weekly' else '' }}>Weekly</option>
                <option value="monthly" {{ 'selected' if worker.rate_unit == 'monthly' else '' }}>Monthly</option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
                <option value="active" {{ 'selected' if worker.status == 'active' else '' }}>Active</option>
                <option value="inactive" {{ 'selected' if worker.status == 'inactive' else '' }}>Inactive</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Start Date</label>
            <input type="date" name="start_date" class="form-control" required value="{{ worker.start_date.isoformat() if worker.start_date else '' }}">
        </div>
        <div class="col-md-3">
            <label class="form-label">End Date</label>
            <input type="date" name="end_date" class="form-control" value="{{ worker.end_date.isoformat() if worker.end_date else '' }}">
        </div>
        <div class="col-12">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control" rows="3">{{ worker.notes or '' }}</textarea>
        </div>
        <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary" type="submit">Update Worker</button>
            <a href="{{ url_for('casual_workers.view', id=worker.id) }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </div>
</form>
<form method="post" action="{{ url_for('casual_workers.delete', id=worker.id) }}" class="mt-3" onsubmit="return confirm('Delete this casual worker and payments?');">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <button type="submit" class="btn btn-outline-danger">Delete Worker</button>
</form>
{% endblock %}
