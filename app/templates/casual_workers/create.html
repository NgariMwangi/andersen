{% extends "layouts/base.html" %}
{% block title %}Add Casual Worker{% endblock %}
{% block content %}
<h1 class="h4 mb-3">Add Casual Worker</h1>
<form method="post" class="card card-body">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="row g-3">
        <div class="col-md-3">
            <label class="form-label">Worker Number</label>
            <input type="text" name="worker_number" class="form-control" maxlength="30">
        </div>
        <div class="col-md-3">
            <label class="form-label">First Name</label>
            <input type="text" name="first_name" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">Last Name</label>
            <input type="text" name="last_name" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">Branch</label>
            <select name="branch_id" class="form-select" required>
                <option value="">Select branch</option>
                {% for b in branches %}
                <option value="{{ b.id }}">{{ b.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control">
        </div>
        <div class="col-md-3">
            <label class="form-label">National ID</label>
            <input type="text" name="national_id" class="form-control">
        </div>
        <div class="col-md-2">
            <label class="form-label">Rate (KES)</label>
            <input type="number" step="0.01" min="0" name="daily_rate" class="form-control" value="0">
        </div>
        <div class="col-md-2">
            <label class="form-label">Rate Unit</label>
            <select name="rate_unit" class="form-select">
                <option value="hourly">Hourly</option>
                <option value="daily" selected>Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Start Date</label>
            <input type="date" name="start_date" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">End Date</label>
            <input type="date" name="end_date" class="form-control">
        </div>
        <div class="col-12">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control" rows="3"></textarea>
        </div>
        <div class="col-12">
            <button class="btn btn-primary" type="submit">Save Worker</button>
            <a href="{{ url_for('casual_workers.index') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </div>
</form>
{% endblock %}
