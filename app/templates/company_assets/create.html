{% extends "layouts/base.html" %}
{% block title %}Add asset - {{ app_name }}{% endblock %}
{% block content %}
<h1 class="h4 mb-4 fw-600 text-dark">Add company asset</h1>
<div class="card">
    <div class="card-body">
        <form method="post">
            {{ form.hidden_tag() }}
            {% include 'company_assets/_asset_form_fields.html' %}
            <div class="mt-3">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save asset</button>
                <a href="{{ url_for('company_assets.index') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
